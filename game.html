<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Invaders — Nitin Saini</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #050510;
  font-family: 'Orbitron', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* STARFIELD BG */
#bg { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* WRAPPER */
.wrapper {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  width: 100%;
  max-width: 620px;
  padding: 1rem;
}

/* TITLE BAR */
.title-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 1rem 0.5rem 1rem;
  background: rgba(0,245,255,0.05);
  border: 1px solid rgba(0,245,255,0.2);
  border-bottom: none;
  border-radius: 12px 12px 0 0;
}

.game-title {
  font-size: clamp(0.8rem, 3vw, 1.1rem);
  font-weight: 900;
  color: #00f5ff;
  letter-spacing: 3px;
  text-shadow: 0 0 15px #00f5ff88;
}

.back-link {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem;
  color: rgba(0,245,255,0.5);
  text-decoration: none;
  border: 1px solid rgba(0,245,255,0.2);
  padding: 0.25rem 0.6rem;
  border-radius: 4px;
  transition: all 0.2s;
}
.back-link:hover { color: #00f5ff; border-color: #00f5ff; }

/* HUD */
.hud {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.4rem 1rem;
  background: rgba(0,0,0,0.5);
  border-left: 1px solid rgba(0,245,255,0.2);
  border-right: 1px solid rgba(0,245,255,0.2);
}

.hud-item { text-align: center; }
.hud-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  color: rgba(0,245,255,0.5);
  letter-spacing: 2px;
  display: block;
}
.hud-val {
  font-size: clamp(0.9rem, 2.5vw, 1.1rem);
  font-weight: 700;
  color: #fff;
}
#hud-score { color: #00f5ff; }
#hud-lives { color: #ff4466; }
#hud-level { color: #00ff88; }
#hud-hi    { color: #bf00ff; }

/* CANVAS */
#gc {
  display: block;
  width: 100%;
  max-width: 620px;
  border-left: 1px solid rgba(0,245,255,0.2);
  border-right: 1px solid rgba(0,245,255,0.2);
  background: #000008;
  image-rendering: pixelated;
}

/* CONTROLS BAR */
.controls-bar {
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.6rem 1rem;
  background: rgba(0,245,255,0.05);
  border: 1px solid rgba(0,245,255,0.2);
  border-top: none;
  border-radius: 0 0 12px 12px;
  flex-wrap: wrap;
}

.btn {
  font-family: 'Orbitron', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 0.45rem 1.1rem;
  border-radius: 6px;
  border: 1px solid;
  background: transparent;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-start  { border-color: #00ff88; color: #00ff88; }
.btn-pause  { border-color: #00f5ff; color: #00f5ff; }
.btn-start:hover  { background: rgba(0,255,136,0.12); transform: scale(1.04); }
.btn-pause:hover  { background: rgba(0,245,255,0.12); transform: scale(1.04); }

/* MOBILE D-PAD */
.dpad {
  display: none;
  justify-content: center;
  align-items: center;
  gap: 0.5rem;
  margin-top: 0.75rem;
}
@media (max-width: 600px) { .dpad { display: flex; } }

.dpad-btn {
  font-size: 1.4rem;
  width: 56px; height: 56px;
  border-radius: 10px;
  border: 1px solid rgba(0,245,255,0.3);
  background: rgba(0,245,255,0.06);
  color: #00f5ff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.dpad-btn:active { background: rgba(0,245,255,0.2); }

.hint {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  color: rgba(255,255,255,0.2);
  letter-spacing: 1px;
  margin-top: 0.4rem;
  text-align: center;
}

/* OVERLAY */
#overlay {
  position: fixed; inset: 0; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  background: rgba(5,5,16,0.88);
  transition: opacity 0.3s;
}
#overlay.hidden { opacity: 0; pointer-events: none; }

.overlay-box {
  text-align: center;
  padding: 2.5rem 3rem;
  border: 1px solid rgba(0,245,255,0.25);
  border-radius: 16px;
  background: rgba(5,5,30,0.97);
  max-width: 360px;
  width: 90%;
  position: relative;
  overflow: hidden;
}
.overlay-box::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(to right, #00f5ff, #bf00ff, #00ff88);
}

.overlay-title {
  font-size: clamp(1.5rem, 5vw, 2rem);
  font-weight: 900;
  letter-spacing: 3px;
  margin-bottom: 0.5rem;
}
.overlay-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.4);
  margin-bottom: 1.5rem;
  line-height: 1.6;
}
.overlay-score {
  font-size: 1.8rem;
  font-weight: 700;
  color: #00f5ff;
  margin-bottom: 1.5rem;
  text-shadow: 0 0 20px #00f5ff66;
}
.overlay-btn {
  font-family: 'Orbitron', monospace;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 0.75rem 2rem;
  border-radius: 8px;
  border: 1px solid #00ff88;
  background: rgba(0,255,136,0.08);
  color: #00ff88;
  cursor: pointer;
  transition: all 0.2s;
}
.overlay-btn:hover { background: rgba(0,255,136,0.2); transform: scale(1.05); }

.corner { position:absolute; width:12px; height:12px; }
.tl { top:8px; left:8px; border-top:2px solid #00f5ff; border-left:2px solid #00f5ff; }
.tr { top:8px; right:8px; border-top:2px solid #00f5ff; border-right:2px solid #00f5ff; }
.bl { bottom:8px; left:8px; border-bottom:2px solid #00f5ff; border-left:2px solid #00f5ff; }
.br { bottom:8px; right:8px; border-bottom:2px solid #00f5ff; border-right:2px solid #00f5ff; }

/* SCANLINE */
body::after {
  content:'';
  position:fixed; inset:0; z-index:999; pointer-events:none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<!-- OVERLAY (start / gameover / paused) -->
<div id="overlay">
  <div class="overlay-box">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="overlay-title" id="ov-title" style="color:#00f5ff">CODE<br>INVADERS</div>
    <div class="overlay-sub" id="ov-sub">Defend your codebase!<br>Shoot the bugs before they reach your code.</div>
    <div class="overlay-score" id="ov-score" style="display:none"></div>
    <button class="overlay-btn" id="ov-btn" onclick="startGame()">[ START GAME ]</button>
  </div>
</div>

<div class="wrapper">
  <!-- TITLE -->
  <div class="title-bar">
    <span class="game-title">⚡ CODE INVADERS</span>
    <a class="back-link" href="https://github.com/Er-Nitinsaini">← BACK TO PROFILE</a>
  </div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-item"><span class="hud-label">SCORE</span><span class="hud-val" id="hud-score">0</span></div>
    <div class="hud-item"><span class="hud-label">HI-SCORE</span><span class="hud-val" id="hud-hi">0</span></div>
    <div class="hud-item"><span class="hud-label">LEVEL</span><span class="hud-val" id="hud-level">1</span></div>
    <div class="hud-item"><span class="hud-label">LIVES</span><span class="hud-val" id="hud-lives">❤️❤️❤️</span></div>
  </div>

  <!-- GAME CANVAS -->
  <canvas id="gc"></canvas>

  <!-- CONTROLS -->
  <div class="controls-bar">
    <button class="btn btn-start" id="start-btn" onclick="startGame()">[ RESTART ]</button>
    <button class="btn btn-pause" onclick="togglePause()">[ PAUSE ]</button>
  </div>

  <!-- MOBILE DPAD -->
  <div class="dpad">
    <button class="dpad-btn" id="btn-left" ontouchstart="mobileLeft=true" ontouchend="mobileLeft=false">◀</button>
    <button class="dpad-btn" id="btn-shoot" ontouchstart="mobileFire()">🔥</button>
    <button class="dpad-btn" id="btn-right" ontouchstart="mobileRight=true" ontouchend="mobileRight=false">▶</button>
  </div>

  <div class="hint">← → / A D to move &nbsp;·&nbsp; SPACE to shoot &nbsp;·&nbsp; P to pause</div>
</div>

<script>
// ── STARFIELD BG ──────────────────────────────────────
const bgC = document.getElementById('bg');
const bgX = bgC.getContext('2d');
let stars = [];
function resizeBg() {
  bgC.width = innerWidth; bgC.height = innerHeight;
  stars = Array.from({length:120}, () => ({
    x: Math.random()*innerWidth, y: Math.random()*innerHeight,
    r: Math.random()*1.4+0.2, a: Math.random()*0.6+0.1,
    v: Math.random()*0.3+0.05
  }));
}
resizeBg(); addEventListener('resize', resizeBg);
function animBg() {
  bgX.clearRect(0,0,bgC.width,bgC.height);
  bgX.fillStyle='#050510'; bgX.fillRect(0,0,bgC.width,bgC.height);
  // grid
  bgX.strokeStyle='rgba(0,245,255,0.025)'; bgX.lineWidth=0.5;
  for(let x=0;x<bgC.width;x+=40){bgX.beginPath();bgX.moveTo(x,0);bgX.lineTo(x,bgC.height);bgX.stroke();}
  for(let y=0;y<bgC.height;y+=40){bgX.beginPath();bgX.moveTo(0,y);bgX.lineTo(bgC.width,y);bgX.stroke();}
  stars.forEach(s=>{
    bgX.beginPath();bgX.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgX.fillStyle=`rgba(180,210,255,${s.a})`;bgX.fill();
    s.y+=s.v; if(s.y>bgC.height){s.y=0;s.x=Math.random()*bgC.width;}
  });
  requestAnimationFrame(animBg);
}
animBg();

// ── CANVAS SETUP ──────────────────────────────────────
const gc = document.getElementById('gc');
const ctx = gc.getContext('2d');
const GW = 620, GH = 400;
gc.width = GW; gc.height = GH;

// ── GAME STATE ────────────────────────────────────────
let state = 'idle';
let score=0, hiScore=0, lives=3, level=1;
let player, bullets, eBullets, enemies, particles, shields;
let eDir=1, eMoveT=0, eShootT=0, animId;
let keys={}, mobileLeft=false, mobileRight=false;
let flashTimer=0, waveMsg='', waveMsgT=0;

// ── ENEMY TYPES ───────────────────────────────────────
const ETYPES = [
  {icon:'🐛', pts:30, speed:1.2},
  {icon:'🦟', pts:20, speed:1.0},
  {icon:'🪲', pts:10, speed:0.8},
];

// ── SHIELD BLOCKS ─────────────────────────────────────
function makeShields() {
  shields = [];
  [130,260,390,490].forEach(sx=>{
    for(let bx=0;bx<4;bx++) for(let by=0;by<3;by++) {
      shields.push({x:sx+bx*12,y:GH-80+by*10,w:10,h:8,hp:3});
    }
  });
}

// ── INIT ──────────────────────────────────────────────
function initGame() {
  score=0; lives=3; level=1; eDir=1; eMoveT=0; eShootT=0;
  bullets=[]; eBullets=[]; particles=[];
  player = {x:GW/2, y:GH-28, w:32, h:22, speed:5, shootCool:0};
  makeShields();
  spawnWave();
  updateHUD();
}

function spawnWave() {
  enemies=[];
  const cols=10, spacing=50, startX=30;
  [0,1,2].forEach((row,ri)=>{
    for(let c=0;c<cols;c++){
      const t = ETYPES[ri];
      enemies.push({
        x:startX+c*spacing, y:40+ri*38,
        w:28, h:24, icon:t.icon, pts:t.pts,
        alive:true, pulse:Math.random()*Math.PI*2
      });
    }
  });
  waveMsg = `WAVE ${level}`; waveMsgT = 90;
}

// ── START / PAUSE ─────────────────────────────────────
function startGame() {
  if(animId) cancelAnimationFrame(animId);
  state='running';
  initGame();
  hideOverlay();
  gameLoop();
}

function togglePause() {
  if(state==='running') { state='paused'; showOverlay('PAUSED','','',false); }
  else if(state==='paused') { state='running'; hideOverlay(); gameLoop(); }
}

function showOverlay(title,sub,scoreStr,showScore,titleColor='#00f5ff') {
  document.getElementById('ov-title').textContent=title;
  document.getElementById('ov-title').style.color=titleColor;
  document.getElementById('ov-sub').innerHTML=sub;
  const sc=document.getElementById('ov-score');
  if(showScore){sc.style.display='block';sc.textContent=scoreStr;}
  else sc.style.display='none';
  document.getElementById('overlay').classList.remove('hidden');
}
function hideOverlay(){document.getElementById('overlay').classList.add('hidden');}

// ── HUD ───────────────────────────────────────────────
function updateHUD(){
  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-hi').textContent=hiScore;
  document.getElementById('hud-level').textContent=level;
  document.getElementById('hud-lives').textContent='❤️'.repeat(Math.max(0,lives));
}

// ── INPUT ─────────────────────────────────────────────
addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){e.preventDefault(); tryShoot();}
  if(e.code==='KeyP') togglePause();
});
addEventListener('keyup',e=>{keys[e.code]=false;});

function tryShoot(){
  if(state!=='running') return;
  if(player.shootCool>0) return;
  bullets.push({x:player.x,y:player.y-14,w:3,h:12,speed:9});
  player.shootCool=12;
}
function mobileFire(){tryShoot();}

// ── PARTICLES ─────────────────────────────────────────
function boom(x,y,color,count=10){
  for(let i=0;i<count;i++){
    const a=(i/count)*Math.PI*2, sp=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color,r:2+Math.random()*2});
  }
}

// ── GAME LOOP ─────────────────────────────────────────
function gameLoop(){
  if(state!=='running') return;

  // player move
  if(keys['ArrowLeft']||keys['KeyA']||mobileLeft)
    player.x=Math.max(player.w/2, player.x-player.speed);
  if(keys['ArrowRight']||keys['KeyD']||mobileRight)
    player.x=Math.min(GW-player.w/2, player.x+player.speed);
  if(player.shootCool>0) player.shootCool--;

  // bullets move
  bullets = bullets.filter(b=>{ b.y-=b.speed; return b.y>-10; });
  eBullets = eBullets.filter(b=>{ b.y+=b.speed; return b.y<GH+10; });

  // enemy movement
  eMoveT++;
  const interval = Math.max(5, 28 - level*2 - Math.floor((30-enemies.filter(e=>e.alive).length)*0.4));
  if(eMoveT>=interval){
    eMoveT=0;
    let edge=false;
    enemies.forEach(e=>{if(!e.alive)return; e.x+=eDir*2; if(e.x>GW-20||e.x<20) edge=true;});
    if(edge){ eDir*=-1; enemies.forEach(e=>{if(e.alive)e.y+=16;}); }
  }

  // enemy shoot
  eShootT++;
  if(eShootT>Math.max(30, 80-level*8)){
    eShootT=0;
    const alive=enemies.filter(e=>e.alive);
    if(alive.length){
      const s=alive[Math.floor(Math.random()*alive.length)];
      eBullets.push({x:s.x,y:s.y+14,speed:3+level*0.4});
    }
  }

  // bullet vs enemy
  for(let b of bullets){
    for(let e of enemies){
      if(!e.alive) continue;
      if(Math.abs(b.x-e.x)<16 && Math.abs(b.y-e.y)<14){
        e.alive=false; b.y=-999;
        score+=e.pts; if(score>hiScore)hiScore=score;
        boom(e.x,e.y,'#00ff88');
        flashTimer=4;
        updateHUD();
      }
    }
  }

  // bullet vs shield
  for(let b of bullets){
    for(let s of shields){
      if(s.hp<=0) continue;
      if(b.x>s.x&&b.x<s.x+s.w&&b.y>s.y&&b.y<s.y+s.h){
        s.hp--; b.y=-999; boom(s.x+s.w/2,s.y,'#888844',4);
      }
    }
  }

  // enemy bullet vs shield
  for(let b of eBullets){
    for(let s of shields){
      if(s.hp<=0) continue;
      if(b.x>s.x&&b.x<s.x+s.w&&b.y>s.y&&b.y<s.y+s.h){
        s.hp--; b.y=GH+999;
      }
    }
  }

  // enemy bullet vs player
  for(let b of eBullets){
    if(Math.abs(b.x-player.x)<16&&Math.abs(b.y-player.y)<12){
      b.y=GH+999; lives--;
      boom(player.x,player.y,'#ff4466',14);
      flashTimer=10;
      updateHUD();
      if(lives<=0){ state='gameover'; drawFrame(); gameOver(); return; }
    }
  }

  // enemy reaches bottom
  if(enemies.some(e=>e.alive&&e.y>GH-50)){
    state='gameover'; drawFrame(); gameOver(); return;
  }

  // wave clear
  if(enemies.every(e=>!e.alive)){
    level++;
    makeShields();
    spawnWave();
    updateHUD();
  }

  // particles
  particles=particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.life-=0.04; p.vy+=0.12;
    return p.life>0;
  });

  if(waveMsgT>0) waveMsgT--;
  if(flashTimer>0) flashTimer--;

  drawFrame();
  animId=requestAnimationFrame(gameLoop);
}

function gameOver(){
  setTimeout(()=>{
    showOverlay(
      'GAME OVER',
      `You reached <b style="color:#00ff88">WAVE ${level}</b><br>Keep grinding, developer!`,
      `SCORE: ${score}`,
      true,
      '#ff4466'
    );
    document.getElementById('ov-btn').textContent='[ TRY AGAIN ]';
  }, 600);
}

// ── DRAW ──────────────────────────────────────────────
function drawFrame(){
  ctx.clearRect(0,0,GW,GH);

  // flash overlay on hit
  if(flashTimer>0){
    ctx.fillStyle=`rgba(255,50,50,${flashTimer*0.015})`;
    ctx.fillRect(0,0,GW,GH);
  }

  // ground line
  ctx.strokeStyle='rgba(0,245,255,0.15)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,GH-18); ctx.lineTo(GW,GH-18); ctx.stroke();

  // shields
  shields.forEach(s=>{
    if(s.hp<=0) return;
    const alpha=[0,0.3,0.6,1][s.hp];
    ctx.fillStyle=`rgba(0,245,255,${alpha})`;
    ctx.fillRect(s.x,s.y,s.w,s.h);
  });

  // enemies
  ctx.font='22px serif'; ctx.textAlign='center';
  enemies.forEach(e=>{
    if(!e.alive) return;
    e.pulse+=0.06;
    ctx.save();
    ctx.translate(e.x,e.y);
    ctx.scale(1+Math.sin(e.pulse)*0.07, 1+Math.sin(e.pulse)*0.07);
    ctx.fillText(e.icon,0,8);
    ctx.restore();
  });

  // player bullets
  bullets.forEach(b=>{
    ctx.save();
    ctx.shadowBlur=10; ctx.shadowColor='#00f5ff';
    ctx.fillStyle='#00f5ff';
    ctx.fillRect(b.x-1.5,b.y,3,b.h);
    ctx.restore();
  });

  // enemy bullets
  eBullets.forEach(b=>{
    ctx.save();
    ctx.shadowBlur=8; ctx.shadowColor='#ff4466';
    const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,5);
    g.addColorStop(0,'#ff8888'); g.addColorStop(1,'#ff004466');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(b.x,b.y,4.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // player spaceship
  ctx.save();
  ctx.translate(player.x,player.y);
  ctx.shadowBlur=18; ctx.shadowColor='#00f5ff';
  // body
  ctx.fillStyle='#00c8e0';
  ctx.beginPath();
  ctx.moveTo(0,-16); ctx.lineTo(-14,10); ctx.lineTo(-6,5);
  ctx.lineTo(0,10); ctx.lineTo(6,5); ctx.lineTo(14,10);
  ctx.closePath(); ctx.fill();
  // cockpit
  ctx.fillStyle='#ffffff44';
  ctx.beginPath(); ctx.ellipse(0,-4,4,7,0,0,Math.PI*2); ctx.fill();
  // engine glow
  ctx.shadowBlur=6; ctx.shadowColor='#ff8800';
  ctx.fillStyle='#ff8800';
  ctx.beginPath(); ctx.ellipse(0,11,4,3,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // particles
  particles.forEach(p=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    const hex=Math.floor(p.life*255).toString(16).padStart(2,'0');
    ctx.fillStyle=p.color+hex; ctx.fill();
  });

  // wave message
  if(waveMsgT>0){
    const a=Math.min(1,waveMsgT/30);
    ctx.save();
    ctx.globalAlpha=a;
    ctx.font='bold 28px Orbitron, monospace';
    ctx.textAlign='center';
    ctx.fillStyle='#00ff88';
    ctx.shadowBlur=20; ctx.shadowColor='#00ff88';
    ctx.fillText(waveMsg,GW/2,GH/2-10);
    ctx.font='13px Share Tech Mono, monospace';
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('DEFEND YOUR CODEBASE!',GW/2,GH/2+16);
    ctx.restore();
  }

  // paused text on canvas
  if(state==='paused'){
    ctx.fillStyle='rgba(5,5,16,0.6)'; ctx.fillRect(0,0,GW,GH);
    ctx.font='bold 30px Orbitron'; ctx.textAlign='center';
    ctx.fillStyle='#00f5ff'; ctx.shadowBlur=20; ctx.shadowColor='#00f5ff';
    ctx.fillText('PAUSED',GW/2,GH/2);
  }
}

// initial draw
drawFrame();
</script>
</body>
</html>
